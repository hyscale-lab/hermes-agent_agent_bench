name: agent_bench_otlp
version: 0.1.0
description: "Export Hermes observer hook events to Agent Bench OpenTelemetry logs."
author: "Agent Bench"
kind: standalone
hooks:
  - on_session_start
  - on_session_end
  - pre_llm_call
  - post_llm_call
  - pre_api_request
  - post_api_request
  - api_request_error
  - pre_tool_call
  - post_tool_call
  - pre_approval_request
  - post_approval_response
  - subagent_start
  - subagent_stop
